name: remind

x-app: &app
  build:
    context: .
    dockerfile: Dockerfile
    args:
      VERSION: ${VERSION:-dev}
  image: remind:local
  environment:
    CONFIG_FILE: /app/config.yaml
    TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-}
    LLM_API_KEY: ${LLM_API_KEY:-}
    EPG_SERVICE_API_KEY: ${EPG_SERVICE_API_KEY:-}
    EPG_SERVICE_BASE_URL: ${EPG_SERVICE_BASE_URL:-}
    LOG_LEVEL: ${LOG_LEVEL:-}
    DATABASE_DRIVER: ${DATABASE_DRIVER:-sqlite}
    DATABASE_DSN: ${DATABASE_DSN:-/data/remind.db}
    DATABASE_URL: ${DATABASE_URL:-}
  volumes:
    - reminddata:/data
    - ./config.yaml:/app/config.yaml:ro
  restart: unless-stopped

services:
  migrate:
    <<: *app
    command: ["/usr/local/bin/remindctl", "migrate", "up"]
    restart: on-failure
    dns:
      - 8.8.8.8
      - 1.1.1.1

  bot:
    <<: *app
    command: ["/usr/local/bin/bot"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    dns:
      - 8.8.8.8
      - 1.1.1.1

  worker:
    <<: *app
    command: ["/usr/local/bin/worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    dns:
      - 8.8.8.8
      - 1.1.1.1

  api:
    <<: *app
    command: ["/usr/local/bin/api"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "${API_PORT:-8080}:8080"
    dns:
      - 8.8.8.8
      - 1.1.1.1

volumes:
  reminddata:
